services:
  db:
    container_name: bird-database
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: bird_mysql
      MYSQL_ROOT_PASSWORD: 'strong'
    volumes:
      - ./database/db_data:/var/lib/mysql
    restart: always
    networks:
      - bird
  frontend:
    container_name: bird-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - '80:80'
    restart: always
    networks:
      - bird
networks:
  bird:
    driver: bridge
